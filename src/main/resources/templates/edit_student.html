<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Student Management System</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/students/new}">
                        New Student
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/students}">
                        Students
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<br><br>

<div class="container row col-md-8 offset-md-2">
    <div class="card">

        <div class="card-header">
            <h2 class="text-center">Edit Student</h2>
        </div>

        <div class="card-body">

            <form method="post"
                  th:action="@{/students/{studentId}(studentId=${student.id})}"                  th:object="${student}">

                <!-- First Name -->
                <div class="form-group mb-3">
                    <label class="form-label">Student First Name</label>

                    <input type="text"
                           class="form-control"
                           id="firstName"
                           placeholder="Enter first name"
                           th:field="*{firstName}" />

                    <p th:if="${#fields.hasErrors('firstName')}"
                       th:errors="*{firstName}"
                       class="text-danger"></p>
                </div>

                <!-- Last Name -->
                <div class="form-group mb-3">
                    <label class="form-label">Student Last Name</label>

                    <input type="text"
                           class="form-control"
                           id="lastName"
                           placeholder="Enter last name"
                           th:field="*{lastName}" />

                    <p th:if="${#fields.hasErrors('lastName')}"
                       th:errors="*{lastName}"
                       class="text-danger"></p>
                </div>

                <!-- Email -->
                <div class="form-group mb-3">
                    <label class="form-label">Student Email</label>

                    <input type="email"
                           class="form-control"
                           id="email"
                           placeholder="Enter email address"
                           th:field="*{email}" />

                    <p th:if="${#fields.hasErrors('email')}"
                       th:errors="*{email}"
                       class="text-danger"></p>
                </div>

                <button type="submit" class="btn btn-primary">
                    Submit
                </button>

            </form>

        </div>
    </div>
</div>

</body>
</html>
